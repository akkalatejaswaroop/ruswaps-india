[build]
  command = "npm run build"
  publish = ".next"

[build.secrets]
  SECRETS_SCAN_ENABLED = false

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"
  SECRETS_SCAN_OMIT_KEYS = "SMTP_HOST"

[functions]
  node_bundler = "esbuild"
  included_files = ["prisma/**"]

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[scheduled_functions]]
  function_name = "ecourts-sync"
  cron = "0 23 * * *"
  freeze_branch = "main"

[[redirects]]
  from = "/home"
  to = "/dashboard"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-DNS-Prefetch-Control = "on"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'nonce' https://checkout.razorpay.com https://js.stripe.com https://cdn.debugbear.com; frame-src 'self' https://checkout.razorpay.com https://js.stripe.com; frame-ancestors 'none'; style-src 'self' 'nonce' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://api.razorpay.com https://api.stripe.com https://cdn.debugbear.com https://rum.debugbear.com; media-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://ruswaps.in"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, PATCH, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Access-Control-Allow-Credentials = "true"
    Access-Control-Max-Age = "86400"
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate"
    Pragma = "no-cache"

[[headers]]
  for = "/api/auth/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://ruswaps.in"
    Access-Control-Allow-Credentials = "true"
