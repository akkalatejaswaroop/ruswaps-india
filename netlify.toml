[build]
  command = "npm run build"
  publish = ".next"

[build.secrets]
  SECRETS_SCAN_OMIT_KEYS = ["SMTP_HOST", "SMTP_PORT", "SMTP_USER", "SMTP_PASS", "SMTP_FROM", "RAZORPAY_KEY_ID", "RAZORPAY_KEY_SECRET", "ONESIGNAL_API_KEY", "ONESIGNAL_APP_ID", "DATABASE_URL", "JWT_SECRET"]

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from = "/home"
  to = "/dashboard"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "origin-when-cross-origin"

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, x-admin-key"

[[headers]]
  for = "/api/auth/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
